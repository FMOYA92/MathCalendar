<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Recordatorios</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── Banner ─── */
    .site-banner {
      position: relative;
      width: 100%;
      height: 17vh;
      flex-shrink: 0;
    }
    .site-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('logo.png');
      background-size: 60% auto;
      background-position: center center;
      background-repeat: no-repeat;
      -webkit-mask-image:
        linear-gradient(to right,  transparent, black 28%, black 72%, transparent),
        linear-gradient(to bottom, transparent, black 22%, black 78%, transparent);
      -webkit-mask-composite: source-in;
      mask-image:
        linear-gradient(to right,  transparent, black 28%, black 72%, transparent),
        linear-gradient(to bottom, transparent, black 22%, black 78%, transparent);
      mask-composite: intersect;
    }

    .banner-controls {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      justify-content: space-between;
      padding: 10px 22px;
      z-index: 2;
    }
    .banner-left  { display: flex; align-items: center; }
    .banner-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; }

    .bc-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #dateDisplay {
      font-size: 1.5rem;
      font-weight: 500;
      color: #94a3b8;
      text-shadow: 0 1px 4px rgba(0,0,0,0.85);
    }

    .sync-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #22c55e;
      display: inline-block;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .sync-dot.active { opacity: 1; }

    #clock {
      font-size: calc(17vh - 24px);
      font-weight: 700;
      color: #e0e0e0;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
      line-height: 1;
      letter-spacing: 0.06em;
    }

    .fs-btn {
      background: #1e1e3a;
      border: 1px solid #3a3a5a;
      color: #94a3b8;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 0.88rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, color 0.2s;
    }
    .fs-btn:hover { background: #2a2a4a; color: #e0e0e0; }

    .admin-link {
      background: #1e1e3a;
      border: 1px solid #4c1d95;
      color: #a78bfa;
      text-decoration: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 0.88rem;
      transition: background 0.2s, border-color 0.2s;
    }
    .admin-link:hover { background: #4c1d95; border-color: #7c3aed; color: #fff; }

    .music-btn {
      background: #1e1e3a;
      border: 1px solid #3a3a5a;
      color: #94a3b8;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 0.88rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .music-btn:hover { background: #2a2a4a; color: #e0e0e0; }
    .music-btn.playing { border-color: #22c55e; color: #86efac; }

    /* ─── Layout principal ─── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ─── Panel Izquierdo: Recordatorios (70%) ─── */
    .reminders-panel {
      width: 70%;
      padding: 22px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2a2a4a;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .panel-title-cyan { color: #38bdf8; }

    /* ─── Lista de recordatorios ─── */
    .reminders-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
      transition: opacity 0.4s ease;
    }
    .reminders-list.fading { opacity: 0; }

    .reminder-card {
      background: #1a1a2e;
      border-radius: 14px;
      padding: 18px 22px;
      border-left: 5px solid #7c3aed;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .reminder-card:hover { transform: translateX(4px); box-shadow: 0 4px 22px rgba(124,58,237,0.18); }

    .reminder-card.urgency-red    { border-left-color: #ef4444; }
    .reminder-card.urgency-yellow { border-left-color: #f59e0b; }
    .reminder-card.urgency-green  { border-left-color: #22c55e; }
    .reminder-card.urgency-none   { border-left-color: #7c3aed; }

    /* Urgencia < 24h */
    @keyframes urgentPulse {
      0%,100% { box-shadow: none; }
      50%      { box-shadow: 0 0 18px 5px rgba(239,68,68,0.45); }
    }
    .reminder-card.urgent {
      animation: urgentPulse 2s ease-in-out infinite;
      border-left-color: #ef4444 !important;
    }

    .reminder-title { font-size: 1.7rem; font-weight: 600; margin-bottom: 8px; word-break: break-word; line-height: 1.25; }
    .reminder-desc  { font-size: 1.05rem; color: #94a3b8; margin-bottom: 8px; }

    .reminder-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .reminder-date { font-size: 1.35rem; color: #94a3b8; }

    .badge {
      font-size: 0.95rem;
      padding: 3px 12px;
      border-radius: 20px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-urgente { background: #450a0a; color: #fca5a5; animation: urgentPulse 2s ease-in-out infinite; }

    /* ─── Indicador de carrusel ─── */
    .carousel-dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 12px 0 4px;
      flex-shrink: 0;
      min-height: 32px;
    }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #2a2a4a;
      transition: background 0.3s, transform 0.3s;
    }
    .dot.active { background: #7c3aed; transform: scale(1.3); }

    /* ─── Empty state ─── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #4b5563;
      gap: 10px;
    }
    .empty-state svg { width: 64px; height: 64px; opacity: 0.35; }
    .empty-state span { font-size: 1.1rem; }

    /* ─── Panel Derecho: Cuentas Regresivas (30%) ─── */
    .countdowns-panel {
      width: 30%;
      padding: 22px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .countdowns-list {
      flex: 1;
      overflow: hidden;
      position: relative;
      perspective: 1400px;
    }

    .countdowns-track {
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1),
                  filter 0.35s ease;
      will-change: transform, filter;
    }

    .countdowns-track.sliding {
      filter: blur(2px) brightness(0.75);
    }

    .countdown-card {
      background: #0f172a;
      border-radius: 14px;
      padding: 14px;
      border: 1px solid #1e3a5f;
      flex-shrink: 0;
      height: var(--cd-card-h, auto);
      box-sizing: border-box;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .cd-info { flex: 1; min-width: 0; }

    .countdown-label {
      font-size: 1.1rem;
      color: #7dd3fc;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .countdown-target { font-size: 0.95rem; color: #64748b; }

    .cd-num { flex-shrink: 0; width: 76px; background: #1e293b; border-radius: 10px; padding: 8px 4px; text-align: center; }
    .cd-value { font-size: 2rem; font-weight: 700; color: #38bdf8; font-variant-numeric: tabular-nums; line-height: 1; }
    .cd-label { font-size: 0.82rem; color: #64748b; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* ─── Landing Overlay ────────────────────────────────────────────────────── */
    #lo { position:fixed;inset:0;z-index:999;background:#060610;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:opacity 1.2s ease; }
    #lo.lo-out { opacity:0;pointer-events:none; }
    .lo-bg { position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 60% at 50% 55%,rgba(30,64,175,.14) 0%,transparent 70%),radial-gradient(ellipse at 15% 65%,rgba(59,130,246,.09) 0%,transparent 50%),radial-gradient(ellipse at 85% 35%,rgba(245,158,11,.07) 0%,transparent 50%);animation:loBg 7s ease-in-out infinite; }
    @keyframes loBg { 0%,100%{opacity:.7} 50%{opacity:1.4} }
    .lo-wrap { display:flex;flex-direction:column;align-items:center;gap:24px;z-index:10;text-align:center;padding:40px; }
    .lo-logo-wrap { display:flex;flex-direction:column;align-items:center;gap:0; }
    .lo-logo { width:600px;height:220px;animation:loLogo 4s ease-in-out infinite; }
    .lo-logo img { width:100%;height:100%;object-fit:contain; }
    @keyframes loLogo { 0%,100%{filter:drop-shadow(0 0 12px rgba(147,197,253,.25))} 50%{filter:drop-shadow(0 0 28px rgba(147,197,253,.55)) drop-shadow(0 0 55px rgba(59,130,246,.25))} }
    .lo-greet { font-family:'Bebas Neue',sans-serif;font-size:7rem;font-weight:400;color:#fbbf24;letter-spacing:.08em;line-height:1;animation:loGlow 3s ease-in-out infinite; }
    @keyframes loGlow { 0%,100%{text-shadow:0 0 18px rgba(251,191,36,.35),0 0 40px rgba(251,191,36,.12)} 50%{text-shadow:0 0 30px rgba(251,191,36,.75),0 0 80px rgba(251,191,36,.38),0 0 130px rgba(251,191,36,.16)} }
    .lo-dept { font-size:1.85rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:linear-gradient(90deg,#60a5fa 0%,#93c5fd 30%,#e0f2fe 50%,#93c5fd 70%,#60a5fa 100%);background-size:250% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:loShim 5s linear infinite; }
    @keyframes loShim { 0%{background-position:250% center} 100%{background-position:-250% center} }
    .lo-div { position:relative;width:200px;height:1px;background:linear-gradient(to right,transparent,#f59e0b,transparent);animation:loDiv 3s ease-in-out infinite; }
    .lo-div::before,.lo-div::after { content:'';position:absolute;top:50%;width:5px;height:5px;border-radius:50%;background:#f59e0b;transform:translateY(-50%);box-shadow:0 0 8px #f59e0b,0 0 18px rgba(245,158,11,.7); }
    .lo-div::before{left:0} .lo-div::after{right:0}
    @keyframes loDiv { 0%,100%{opacity:.45} 50%{opacity:1;box-shadow:0 0 14px rgba(245,158,11,.55)} }
    .lo-wx { display:flex;flex-direction:column;align-items:center;gap:6px;min-height:96px;justify-content:center;background:rgba(59,130,246,.05);border:1px solid rgba(147,197,253,.12);border-radius:22px;padding:20px 42px;animation:loCard 4s ease-in-out infinite; }
    @keyframes loCard { 0%,100%{box-shadow:0 0 18px rgba(59,130,246,.08),inset 0 0 18px rgba(59,130,246,.04);border-color:rgba(147,197,253,.12)} 50%{box-shadow:0 0 40px rgba(59,130,246,.22),inset 0 0 30px rgba(59,130,246,.09);border-color:rgba(147,197,253,.3)} }
    .lo-wx-row { display:flex;align-items:center;gap:14px; }
    .lo-wx-icon { font-size:2.6rem;line-height:1; }
    .lo-wx-temp { font-size:3rem;font-weight:700;color:#fbbf24;font-variant-numeric:tabular-nums;text-shadow:0 0 16px rgba(251,191,36,.5); }
    .lo-wx-desc { font-size:.92rem;color:#94a3b8;margin-top:4px; }
    .lo-wx-mm { display:flex;gap:18px;margin-top:2px;font-size:.85rem;font-variant-numeric:tabular-nums; }
    .lo-wx-min{color:#60a5fa} .lo-wx-max{color:#fbbf24}
    .lo-wx-loc { font-size:.72rem;color:#334155;letter-spacing:.1em;text-transform:uppercase; }
    .lo-pb-wrap { width:340px;display:flex;flex-direction:column;align-items:center;gap:10px; }
    .lo-pb { width:100%;height:3px;background:#0e0e22;border-radius:2px;overflow:visible;position:relative; }
    .lo-pb-fill { height:100%;width:0%;background:linear-gradient(to right,#3b82f6,#fbbf24);border-radius:2px;position:relative;box-shadow:0 0 8px #3b82f6,0 0 18px rgba(251,191,36,.45); }
    .lo-pb-fill::after { content:'';position:absolute;right:-2px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:#fbbf24;box-shadow:0 0 10px #fbbf24,0 0 24px rgba(251,191,36,.8); }
    .lo-pb-lbl { font-size:.71rem;color:#1e293b;letter-spacing:.09em;text-transform:uppercase; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>

<!-- ── Landing Overlay ── -->
<div id="lo">
  <canvas id="lo-cvs" style="position:absolute;inset:0;pointer-events:none"></canvas>
  <div class="lo-bg"></div>
  <div class="lo-wrap">
    <div class="lo-logo-wrap">
      <div class="lo-greet" id="lo-greet">Buenos días</div>
      <div class="lo-logo"><img src="logo.png" alt="ACS" /></div>
    </div>
    <div class="lo-wx" id="lo-wx">
      <div style="color:#1e293b;font-size:.82rem;letter-spacing:.06em">Obteniendo clima...</div>
    </div>
    <div class="lo-pb-wrap">
      <div class="lo-pb"><div class="lo-pb-fill" id="lo-fill"></div></div>
      <div class="lo-pb-lbl" id="lo-lbl">Cargando panel...</div>
    </div>
  </div>
</div>

<div class="site-banner">
  <div class="banner-controls">
    <div class="banner-left">
      <div id="clock"></div>
    </div>
    <div class="banner-right">
      <div class="bc-top">
        <span class="sync-dot" id="syncDot" title="Actualizado"></span>
        <button class="fs-btn" id="fsBtn" onclick="toggleFullscreen()">⛶ Pantalla completa</button>
        <a href="admin.html" class="admin-link">⚙ Admin</a>
      </div>
      <button class="music-btn" id="musicBtn" onclick="toggleMusic()">▶ Música</button>
      <div id="dateDisplay"></div>
    </div>
  </div>
</div>

<div class="main">

  <!-- Panel izquierdo: Recordatorios -->
  <section class="reminders-panel">
    <div class="panel-header">
      <span class="panel-title">Recordatorios</span>
    </div>
    <div class="reminders-list" id="remindersList"></div>
    <div class="carousel-dots" id="carouselDots"></div>
  </section>

  <!-- Panel derecho: Cuentas Regresivas -->
  <section class="countdowns-panel">
    <div class="panel-header">
      <span class="panel-title panel-title-cyan">Cuentas Regresivas</span>
    </div>
    <div class="countdowns-list" id="countdownsList">
      <div class="countdowns-track" id="countdownsTrack"></div>
    </div>
  </section>

</div>

<div id="ytPlayerEl" style="position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;bottom:0;left:0"></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ─── Landing Overlay ─────────────────────────────────────────────────────────
(function() {
  const h = new Date().getHours();
  document.getElementById('lo-greet').textContent =
    h >= 5 && h < 12 ? 'Buenos días' : h >= 12 && h < 20 ? 'Buenas tardes' : 'Buenas noches';

  const cvs = document.getElementById('lo-cvs');
  const ctx  = cvs.getContext('2d');
  function resize() { cvs.width = innerWidth; cvs.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);

  const STARS = Array.from({length:130}, () => ({
    x:Math.random(), y:Math.random(), r:Math.random()*1.1+0.2,
    base:Math.random()*0.55+0.1, phase:Math.random()*Math.PI*2,
    speed:Math.random()*0.018+0.004, gold:Math.random()<0.28
  }));
  const PARTS = Array.from({length:55}, () => ({
    x:Math.random(), life:Math.random(), r:Math.random()*1.7+0.3,
    spd:Math.random()*0.00028+0.0001, drft:(Math.random()-0.5)*0.00018,
    base:Math.random()*0.42+0.12, gold:Math.random()<0.42
  }));

  let loRunning = true;
  function loFrame() {
    if (!loRunning) return;
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    STARS.forEach(s => {
      s.phase += s.speed;
      ctx.globalAlpha = s.base*(0.45+0.55*Math.sin(s.phase));
      ctx.beginPath(); ctx.arc(s.x*cvs.width, s.y*cvs.height, s.r, 0, Math.PI*2);
      ctx.fillStyle = s.gold ? '#fbbf24' : '#93c5fd';
      ctx.shadowBlur = s.r > 0.8 ? 6 : 0; ctx.shadowColor = ctx.fillStyle;
      ctx.fill(); ctx.shadowBlur = 0;
    });
    PARTS.forEach(p => {
      p.life += p.spd; p.x += p.drft;
      if (p.life > 1 || p.x < -0.04 || p.x > 1.04) { p.life = 0; p.x = Math.random(); }
      const vy = 1 - p.life;
      const a  = p.life < 0.12 ? (p.life/0.12)*p.base : p.life > 0.82 ? ((1-p.life)/0.18)*p.base : p.base;
      ctx.globalAlpha = a;
      ctx.beginPath(); ctx.arc(p.x*cvs.width, vy*cvs.height, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.gold ? '#fbbf24' : '#93c5fd';
      ctx.shadowBlur = 12; ctx.shadowColor = p.gold ? '#f59e0b' : '#60a5fa';
      ctx.fill(); ctx.shadowBlur = 0;
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(loFrame);
  }
  loFrame();

  const WMO_ICON = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',77:'❄️',80:'🌦️',81:'🌧️',82:'🌧️',85:'🌨️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️'};
  const WMO_DESC = {0:'Despejado',1:'Mayormente despejado',2:'Parcialmente nublado',3:'Nublado',45:'Neblina',48:'Neblina',51:'Llovizna ligera',53:'Llovizna',55:'Llovizna intensa',61:'Lluvia ligera',63:'Lluvia moderada',65:'Lluvia intensa',71:'Nieve ligera',73:'Nieve moderada',75:'Nieve intensa',77:'Granizo',80:'Chaparrones ligeros',81:'Chaparrones',82:'Chaparrones intensos',85:'Nevadas ligeras',86:'Nevadas',95:'Tormenta eléctrica',96:'Tormenta con granizo',99:'Tormenta severa'};
  fetch('https://api.open-meteo.com/v1/forecast?latitude=-33.4569&longitude=-70.5519&current=temperature_2m,weathercode&daily=temperature_2m_max,temperature_2m_min&timezone=America%2FSantiago')
    .then(r => r.json()).then(json => {
      const temp = Math.round(json.current.temperature_2m);
      const code = json.current.weathercode;
      const minT = Math.round(json.daily.temperature_2m_min[0]);
      const maxT = Math.round(json.daily.temperature_2m_max[0]);
      document.getElementById('lo-wx').innerHTML = `
        <div class="lo-wx-row"><span class="lo-wx-icon">${WMO_ICON[code]||'🌤️'}</span><span class="lo-wx-temp">${temp}°C</span></div>
        <div class="lo-wx-desc">${WMO_DESC[code]||'Variable'}</div>
        <div class="lo-wx-mm"><span class="lo-wx-min">↓ ${minT}°C</span><span class="lo-wx-max">↑ ${maxT}°C</span></div>
        <div class="lo-wx-loc">La Reina · Santiago</div>`;
    }).catch(() => {
      document.getElementById('lo-wx').innerHTML = '<div style="color:#1e293b;font-size:.85rem">Clima no disponible</div>';
    });

  const TOTAL = 13000, start = Date.now();
  function loTick() {
    const el   = Date.now() - start;
    const pct  = Math.min((el / TOTAL) * 100, 100);
    const secs = Math.max(Math.ceil((TOTAL - el) / 1000), 0);
    document.getElementById('lo-fill').style.width = pct + '%';
    document.getElementById('lo-lbl').textContent  = secs > 0 ? `Abriendo panel en ${secs}s` : 'Abriendo...';
    if (el >= TOTAL - 1200) document.getElementById('lo').classList.add('lo-out');
    if (el >= TOTAL) { loRunning = false; setTimeout(() => document.getElementById('lo').remove(), 1300); return; }
    requestAnimationFrame(loTick);
  }
  requestAnimationFrame(loTick);
})();
</script>
<script>
  // ─── Supabase ─────────────────────────────────────────────────────────────
  const SUPABASE_URL = 'https://xwdabghkgmfoxcxsjkzo.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3ZGFiZ2hrZ21mb3hjeHNqa3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNjM2NzcsImV4cCI6MjA5NzczOTY3N30.pst6GkiZQvR8uCrZOGMo-s_DWvyA7l4QkoJcBTC0xhk';
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ─── Estado ───────────────────────────────────────────────────────────────
  let reminders  = [];
  let countdowns = [];

  // ─── Carrusel recordatorios ───────────────────────────────────────────────
  const PAGE_SIZE    = 4;
  let currentPage    = 0;
  let carouselTimer  = null;
  let lastTotalPages = -1;

  // ─── Carrusel cuentas regresivas ─────────────────────────────────────────
  let cdOffset    = 0;
  let cdSlideTimer = null;
  let cdLastCount = -1;
  let cdCardH     = 0;
  let cdJustSlid  = false;   // protege el spring de ser interrumpido por re-renders

  // ─── Reloj ────────────────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    const dateStr = now.toLocaleDateString('es-ES', { weekday:'long', day:'2-digit', month:'long' });
    document.getElementById('dateDisplay').textContent =
      dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('clock').textContent = `${h}:${m}`;
  }

  // ─── Utilidades ───────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getActiveReminders() {
    const now = new Date();
    return reminders
      .filter(r => !r.date || new Date(r.date) > now)
      .sort((a, b) => {
        if (!a.date && !b.date) return 0;
        if (!a.date) return 1;
        if (!b.date) return -1;
        return new Date(a.date) - new Date(b.date);
      });
  }

  // ─── Carrusel ─────────────────────────────────────────────────────────────
  function startCarousel(totalPages) {
    if (totalPages === lastTotalPages) return;
    lastTotalPages = totalPages;
    clearInterval(carouselTimer);
    carouselTimer = null;
    if (totalPages <= 1) return;
    carouselTimer = setInterval(advancePage, 12000);
  }

  function advancePage() {
    const data       = getActiveReminders();
    const totalPages = Math.ceil(data.length / PAGE_SIZE) || 1;
    if (totalPages <= 1) return;

    const list = document.getElementById('remindersList');
    list.classList.add('fading');
    setTimeout(() => {
      currentPage = (currentPage + 1) % totalPages;
      renderReminders();
      requestAnimationFrame(() => list.classList.remove('fading'));
    }, 400);
  }

  // ─── Renderizar recordatorios ─────────────────────────────────────────────
  function renderReminders() {
    const list      = document.getElementById('remindersList');
    const dotsEl    = document.getElementById('carouselDots');
    const data      = getActiveReminders();
    const totalPages = Math.ceil(data.length / PAGE_SIZE) || 1;

    if (currentPage >= totalPages) currentPage = 0;

    startCarousel(totalPages);

    // Dots
    dotsEl.innerHTML = totalPages > 1
      ? Array.from({ length: totalPages }, (_, i) =>
          `<span class="dot ${i === currentPage ? 'active' : ''}"></span>`
        ).join('')
      : '';

    if (data.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
                 M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <span>Sin recordatorios activos</span>
        </div>`;
      return;
    }

    const pageData = data.slice(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE);

    list.innerHTML = pageData.map(r => {
      const now      = new Date();
      const msLeft   = r.date ? (new Date(r.date) - now) : Infinity;
      const daysLeft = msLeft / 86400000;
      const urgent   = daysLeft > 0 && daysLeft < 1;

      let urgencyClass = 'urgency-none';
      if (r.date) {
        if (daysLeft <= 2)      urgencyClass = 'urgency-red';
        else if (daysLeft <= 5) urgencyClass = 'urgency-yellow';
        else                    urgencyClass = 'urgency-green';
      }

      const dateStr = r.date
        ? new Date(r.date).toLocaleDateString('es-ES', { day:'2-digit', month:'long', year:'numeric' })
        : '';

      return `
        <div class="reminder-card ${urgencyClass} ${urgent ? 'urgent' : ''}">
          <div class="reminder-title">${escHtml(r.title)}</div>
          ${r.desc ? `<div class="reminder-desc">${escHtml(r.desc)}</div>` : ''}
          <div class="reminder-meta">
            ${dateStr ? `<span class="reminder-date">📅 ${dateStr}</span>` : ''}
            ${urgent ? `<span class="badge badge-urgente">¡Hoy!</span>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  // ─── Carrusel cuentas regresivas: avanzar un slot ────────────────────────
  function advanceCd(count) {
    const track = document.getElementById('countdownsTrack');
    if (!track) return;
    cdOffset = (cdOffset < count - 4) ? cdOffset + 1 : 0;

    // Proteger el spring contra interrupciones de renderCountdowns
    cdJustSlid = true;
    track.classList.add('sliding');
    track.style.transform = `translate3d(0, -${cdOffset * cdCardH}px, 0)`;

    // Quitar blur a los 350ms; liberar protección cuando el spring termina (~1s)
    setTimeout(() => track.classList.remove('sliding'), 350);
    setTimeout(() => { cdJustSlid = false; }, 1000);
  }

  function setupCdSlider(count) {
    if (count === cdLastCount) return;
    cdLastCount = count;
    clearInterval(cdSlideTimer);
    cdSlideTimer = null;
    cdOffset = 0;
    if (count <= 4) return;
    cdSlideTimer = setInterval(() => advanceCd(count), 10000);
  }

  // ─── Renderizar cuentas regresivas ────────────────────────────────────────
  function renderCountdowns() {
    const list  = document.getElementById('countdownsList');
    const track = document.getElementById('countdownsTrack');
    const now   = Date.now();

    // Filter expired, then sort closest first
    const sorted = [...countdowns]
      .filter(cd => new Date(cd.date).getTime() > now)
      .sort((a, b) => new Date(a.date) - new Date(b.date));

    if (sorted.length === 0) {
      track.innerHTML = `<div class="empty-state" style="padding-top:30px;color:#2a4a5a">
        <span style="font-size:3rem">⏳</span>
        <span>Sin cuentas regresivas</span>
      </div>`;
      clearInterval(cdSlideTimer);
      cdSlideTimer = null;
      cdLastCount  = -1;
      cdOffset     = 0;
      return;
    }

    // 4 cards + 3 gaps of 10px fill the container; slot = card + gap
    const CD_GAP = 10;
    const listH  = list.clientHeight;
    if (listH > 0) {
      const cardH = (listH - 3 * CD_GAP) / 4;
      cdCardH = cardH + CD_GAP;            // slot used for translateY
      list.style.setProperty('--cd-card-h', cardH + 'px');
    }

    track.innerHTML = sorted.map(cd => {
      const diff = new Date(cd.date).getTime() - now;

      let value, unit;
      if (diff < 3600000) {
        value = Math.floor(diff / 60000);
        unit  = 'Min';
      } else if (diff < 86400000) {
        value = Math.floor(diff / 3600000);
        unit  = 'Horas';
      } else {
        value = Math.floor(diff / 86400000);
        unit  = 'Días';
      }

      const targetStr = new Date(cd.date).toLocaleString('es-ES', {
        day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'
      });

      return `
        <div class="countdown-card">
          <div class="cd-info">
            <div class="countdown-label">${escHtml(cd.label)}</div>
            <div class="countdown-target">📅 ${targetStr}</div>
          </div>
          <div class="cd-num">
            <div class="cd-value">${String(value).padStart(2,'0')}</div>
            <div class="cd-label">${unit}</div>
          </div>
        </div>`;
    }).join('');

    // Snap a posición actual — pero NO interrumpir si hay un spring en curso
    if (cdOffset >= sorted.length) { cdOffset = 0; cdJustSlid = false; }
    if (!cdJustSlid) {
      track.style.transition = 'none';
      track.style.transform  = `translate3d(0, -${cdOffset * cdCardH}px, 0)`;
      void track.offsetHeight;
      track.style.transition = '';
    }

    setupCdSlider(sorted.length);
  }

  // ─── Pantalla completa ────────────────────────────────────────────────────
  function toggleFullscreen() {
    const btn = document.getElementById('fsBtn');
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
      btn.textContent = '⛶ Salir';
    } else {
      document.exitFullscreen();
      btn.textContent = '⛶ Pantalla completa';
    }
  }

  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement)
      document.getElementById('fsBtn').textContent = '⛶ Pantalla completa';
  });

  // ─── Sincronización en tiempo real ───────────────────────────────────────
  function flashSync() {
    const dot = document.getElementById('syncDot');
    dot.classList.add('active');
    setTimeout(() => dot.classList.remove('active'), 1500);
  }

  async function loadReminders() {
    const { data } = await _supabase.from('reminders').select('*');
    reminders = (data || []).map(r => ({ ...r, desc: r.description }));
    currentPage = 0; lastTotalPages = -1;
    renderReminders();
  }

  async function loadCountdowns() {
    const { data } = await _supabase.from('countdowns').select('*');
    countdowns = data || [];
    cdOffset = 0; cdLastCount = -1;
    renderCountdowns();
  }

  _supabase.channel('db-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'reminders' }, async () => {
      await loadReminders(); flashSync();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'countdowns' }, async () => {
      await loadCountdowns(); flashSync();
    })
    .subscribe();

  // ─── YouTube Player ───────────────────────────────────────────────────────
  var ytPlayer;
  function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('ytPlayerEl', {
      videoId: 'X4VbdwhkE10',
      playerVars: { autoplay: 0, controls: 0, disablekb: 1, fs: 0,
                    iv_load_policy: 3, modestbranding: 1,
                    loop: 1, playlist: 'X4VbdwhkE10' },
      events: {
        onStateChange: function(e) {
          const btn = document.getElementById('musicBtn');
          if (!btn) return;
          const playing = e.data === YT.PlayerState.PLAYING;
          btn.textContent = playing ? '⏸ Música' : '▶ Música';
          btn.classList.toggle('playing', playing);
        }
      }
    });
  }
  function toggleMusic() {
    if (!ytPlayer || typeof ytPlayer.getPlayerState !== 'function') return;
    ytPlayer.getPlayerState() === YT.PlayerState.PLAYING
      ? ytPlayer.pauseVideo()
      : ytPlayer.playVideo();
  }

  // ─── Init ─────────────────────────────────────────────────────────────────
  updateClock();
  setInterval(updateClock, 1000);
  loadReminders();
  loadCountdowns();
  setInterval(renderCountdowns, 1000);
</script>
</body>
</html>
